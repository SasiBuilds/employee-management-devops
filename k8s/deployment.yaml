apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-management
  template:
    metadata:
      labels:
        app: employee-management
    spec:
      containers:
      - name: employee-management
        image: daggubatisashank/employee-management:latest
        ports:
        - containerPort: 80